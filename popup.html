<!DOCTYPE html>
<html lang="en">

<head>
    <title>Kiosk Exit Button</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/options.css" />
    <link rel="stylesheet" href="styles/popup.css" />
</head>

<body class="p-3">
    <!-- Title -->
    <div class="d-flex align-items-center mb-3">
        <i class="bi bi-sliders me-2"></i>
        <h6 class="mb-0 fw-semibold">Kiosk Exit Button</h6>
    </div>

    <hr class="my-2 divider">

    <!-- Status Card -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2 px-3">
            <div id="status" class="d-flex align-items-center gap-2">
                <div class="spinner-border spinner-border-sm text-secondary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <span>Checking...</span>
            </div>
        </div>
    </div>

    <hr class="my-2 divider">

    <!-- Action Section -->
    <div class="action-container">
        <button type="button" id="options" class="btn btn-primary w-100" title="Open Settings">
            <i class="bi bi-gear-fill me-1"></i> Open Settings
        </button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
